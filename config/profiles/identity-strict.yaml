# identity-strict scoring profile (design §4.5). Shipped to make profile
# semantics tangible in the demo (§8.1 stop 7). integrity still computes and
# displays a score but is excluded from the recommendedProfile cascade via
# dimensionWeight 0 (§4.6 active-dimension rule).
name: identity-strict
dimensionWeights:
  integrity: 0.0
  identity:  1.0
  solvency:  0.0
  behavior:  0.0
  safety:    0.0
signalWeights:
  certtype:                 1.0   # identity — the only dimension that drives classification here
  dnssecurity:              1.0   # integrity score still computes; integrity excluded via dimensionWeights
  agentage:                 0.0
  versionstability:         0.0
  certfingerprint.server:   0.0
  certfingerprint.identity: 0.0
  dnsrecord.ans:            0.0
  dnsrecord.ans-badge:      0.0
